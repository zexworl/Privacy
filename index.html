<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Zexworld Account</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
}
.container{
    max-width:700px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
h1{
    text-align:center;
    color:#2d5cff;
}
p{
    color:#555;
    line-height:1.6;
}
input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}
button{
    width:100%;
    padding:14px;
    background:#2d5cff;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#1c47d4;
}
.note{
    margin-top:20px;
    background:#eef5ff;
    padding:15px;
    border-radius:8px;
}
</style>

</head>
<body>

<div class="container">

<h1>Delete Your Zexworld Account</h1>

<p>
If you want to permanently delete your Zexworld account and all associated data,
please fill in the form below.
</p>

<form id="deleteForm">

<input type="email"
placeholder="Registered Email"
required>

<input type="text"
placeholder="Username (Optional)">

<textarea
placeholder="Reason for deleting your account (Optional)"
rows="5"></textarea>

<button type="submit">
Submit Delete Request
</button>

</form>

<div class="note">
<b>Important:</b><br><br>

• Your account will be permanently deleted.<br>
• Posts, profile, and personal data may also be deleted according to our Privacy Policy.<br>

</div>

</div>

<script>
document.getElementById("deleteForm").addEventListener("submit",function(e){
e.preventDefault();

alert("Your account deletion request has been submitted successfully.");

this.reset();
});
</script>

</body>
</html>
